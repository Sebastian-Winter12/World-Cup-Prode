kind = "web"
previewPath = "/"
title = "World Cup Prode 2026"
version = "1.0.0"
id = "artifacts/prode"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24123

[services.development]
run = "pnpm --filter @workspace/prode run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prode", "run", "build" ]
publicDir = "artifacts/prode/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24123"
BASE_PATH = "/"
