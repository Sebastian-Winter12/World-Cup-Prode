openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: World Cup Prode 2026 API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile operations
  - name: groups
    description: Group operations
  - name: matches
    description: Match operations
  - name: predictions
    description: Prediction operations
  - name: leaderboard
    description: Leaderboard operations
  - name: dashboard
    description: Dashboard summary operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Users ────────────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteMe
      tags: [users]
      summary: Delete current user account
      responses:
        "200":
          description: Account deleted

  /users/me/stats:
    get:
      operationId: getMyStats
      tags: [users]
      summary: Get current user statistics
      responses:
        "200":
          description: User statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"

  /users/{userId}/predictions:
    get:
      operationId: getUserPredictions
      tags: [users]
      summary: Get predictions made by a specific user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User predictions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserPredictionItem"
        "404":
          description: User not found

  # ── Groups ───────────────────────────────────────────────────────────────
  /groups:
    get:
      operationId: listMyGroups
      tags: [groups]
      summary: List groups the current user belongs to
      responses:
        "200":
          description: User's groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupWithMeta"
    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a new group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupInput"
      responses:
        "201":
          description: Created group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"

  /groups/join:
    post:
      operationId: joinGroup
      tags: [groups]
      summary: Join a group via invite code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinGroupInput"
      responses:
        "200":
          description: Joined group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "404":
          description: Group not found

  /groups/{groupId}:
    get:
      operationId: getGroup
      tags: [groups]
      summary: Get group details
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Group details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupDetail"
        "404":
          description: Not found

  /groups/{groupId}/leave:
    post:
      operationId: leaveGroup
      tags: [groups]
      summary: Leave a group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Left group

  # ── Matches ──────────────────────────────────────────────────────────────
  /matches:
    get:
      operationId: listMatches
      tags: [matches]
      summary: List all World Cup matches
      parameters:
        - name: stage
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: All matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchWithPrediction"

  /matches/{matchId}:
    get:
      operationId: getMatch
      tags: [matches]
      summary: Get single match details
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Match details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchWithPrediction"
        "404":
          description: Not found

  /matches/{matchId}/score:
    patch:
      operationId: updateMatchScore
      tags: [matches]
      summary: Update match final score (admin only)
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScoreUpdate"
      responses:
        "200":
          description: Updated match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  # ── Predictions ──────────────────────────────────────────────────────────
  /predictions:
    get:
      operationId: listMyPredictions
      tags: [predictions]
      summary: List all predictions for the current user
      responses:
        "200":
          description: User predictions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prediction"

  /predictions/{matchId}:
    put:
      operationId: upsertPrediction
      tags: [predictions]
      summary: Create or update prediction for a match
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PredictionInput"
      responses:
        "200":
          description: Saved prediction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prediction"
        "400":
          description: Predictions locked

  # ── Leaderboard ──────────────────────────────────────────────────────────
  /groups/{groupId}/leaderboard:
    get:
      operationId: getGroupLeaderboard
      tags: [leaderboard]
      summary: Get leaderboard for a group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  # ── Dashboard ────────────────────────────────────────────────────────────
  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get personalized dashboard summary
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"

  /matches/live:
    get:
      operationId: getLiveMatches
      tags: [matches]
      summary: Get currently live matches
      responses:
        "200":
          description: Live matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchWithPrediction"

  /matches/upcoming:
    get:
      operationId: getUpcomingMatches
      tags: [matches]
      summary: Get upcoming matches (next 7 days)
      responses:
        "200":
          description: Upcoming matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchWithPrediction"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Users ──
    User:
      type: object
      required: [id, clerkId, username, email, createdAt, theme, language, notifMatchReminders, notifGroupActivity, notifLeaderboard, notifAnnouncements]
      properties:
        id:
          type: integer
        clerkId:
          type: string
        username:
          type: string
        email:
          type: string
        avatarUrl:
          type: ["string", "null"]
        theme:
          type: string
        language:
          type: string
        notifMatchReminders:
          type: boolean
        notifGroupActivity:
          type: boolean
        notifLeaderboard:
          type: boolean
        notifAnnouncements:
          type: boolean
        createdAt:
          type: string

    UserUpdate:
      type: object
      properties:
        username:
          type: string
        avatarUrl:
          type: string
        theme:
          type: string
        language:
          type: string
        notifMatchReminders:
          type: boolean
        notifGroupActivity:
          type: boolean
        notifLeaderboard:
          type: boolean
        notifAnnouncements:
          type: boolean

    UserStats:
      type: object
      required: [predictionsCount, correctWinners, exactScores, totalPoints, groupsCount, avgPointsPerPrediction]
      properties:
        predictionsCount:
          type: integer
        correctWinners:
          type: integer
        exactScores:
          type: integer
        totalPoints:
          type: integer
        groupsCount:
          type: integer
        avgPointsPerPrediction:
          type: number

    # ── Groups ──
    Group:
      type: object
      required: [id, name, inviteCode, creatorId, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        inviteCode:
          type: string
        creatorId:
          type: integer
        createdAt:
          type: string

    GroupInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string

    JoinGroupInput:
      type: object
      required: [inviteCode]
      properties:
        inviteCode:
          type: string

    GroupWithMeta:
      type: object
      required: [id, name, inviteCode, creatorId, createdAt, memberCount, myPoints, myRank]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        inviteCode:
          type: string
        creatorId:
          type: integer
        createdAt:
          type: string
        memberCount:
          type: integer
        myPoints:
          type: integer
        myRank:
          type: integer

    GroupDetail:
      type: object
      required: [id, name, inviteCode, creatorId, createdAt, members]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        inviteCode:
          type: string
        creatorId:
          type: integer
        createdAt:
          type: string
        members:
          type: array
          items:
            $ref: "#/components/schemas/GroupMember"

    GroupMember:
      type: object
      required: [userId, username, avatarUrl, points, correctWinners, exactScores, joinedAt]
      properties:
        userId:
          type: integer
        username:
          type: string
        avatarUrl:
          type: ["string", "null"]
        points:
          type: integer
        correctWinners:
          type: integer
        exactScores:
          type: integer
        previousRank:
          type: ["integer", "null"]
        joinedAt:
          type: string

    UserPredictionItem:
      type: object
      required: [matchId, homeTeam, awayTeam, matchDate, homeGoals, awayGoals, matchStatus]
      properties:
        matchId:
          type: integer
        homeTeam:
          type: string
        awayTeam:
          type: string
        homeFlag:
          type: ["string", "null"]
        awayFlag:
          type: ["string", "null"]
        matchDate:
          type: string
        homeGoals:
          type: integer
        awayGoals:
          type: integer
        homeScore:
          type: ["integer", "null"]
        awayScore:
          type: ["integer", "null"]
        matchStatus:
          type: string
        points:
          type: ["integer", "null"]

    # ── Matches ──
    Match:
      type: object
      required: [id, homeTeam, awayTeam, matchDate, stadium, stage, status, matchday]
      properties:
        id:
          type: integer
        homeTeam:
          type: string
        awayTeam:
          type: string
        homeFlag:
          type: ["string", "null"]
        awayFlag:
          type: ["string", "null"]
        matchDate:
          type: string
        stadium:
          type: string
        stage:
          type: string
        matchday:
          type: integer
        status:
          type: string
          enum: [scheduled, live, finished]
        homeScore:
          type: ["integer", "null"]
        awayScore:
          type: ["integer", "null"]
        group:
          type: ["string", "null"]

    MatchWithPrediction:
      type: object
      required: [id, homeTeam, awayTeam, matchDate, stadium, stage, status, matchday]
      properties:
        id:
          type: integer
        homeTeam:
          type: string
        awayTeam:
          type: string
        homeFlag:
          type: ["string", "null"]
        awayFlag:
          type: ["string", "null"]
        matchDate:
          type: string
        stadium:
          type: string
        stage:
          type: string
        matchday:
          type: integer
        status:
          type: string
          enum: [scheduled, live, finished]
        homeScore:
          type: ["integer", "null"]
        awayScore:
          type: ["integer", "null"]
        group:
          type: ["string", "null"]
        myPrediction:
          $ref: "#/components/schemas/PredictionOrNull"

    PredictionOrNull:
      type: ["object", "null"]
      properties:
        homeGoals:
          type: integer
        awayGoals:
          type: integer
        points:
          type: ["integer", "null"]

    ScoreUpdate:
      type: object
      required: [homeScore, awayScore, status]
      properties:
        homeScore:
          type: integer
        awayScore:
          type: integer
        status:
          type: string
          enum: [scheduled, live, finished]

    # ── Predictions ──
    Prediction:
      type: object
      required: [id, matchId, userId, homeGoals, awayGoals, createdAt]
      properties:
        id:
          type: integer
        matchId:
          type: integer
        userId:
          type: integer
        homeGoals:
          type: integer
        awayGoals:
          type: integer
        points:
          type: ["integer", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    PredictionInput:
      type: object
      required: [homeGoals, awayGoals]
      properties:
        homeGoals:
          type: integer
          minimum: 0
        awayGoals:
          type: integer
          minimum: 0

    # ── Leaderboard ──
    LeaderboardEntry:
      type: object
      required: [rank, userId, username, totalPoints, correctWinners, exactScores]
      properties:
        rank:
          type: integer
        userId:
          type: integer
        username:
          type: string
        avatarUrl:
          type: ["string", "null"]
        totalPoints:
          type: integer
        correctWinners:
          type: integer
        exactScores:
          type: integer

    # ── Dashboard ──
    Dashboard:
      type: object
      required: [totalPoints, predictionsCount, correctWinners, exactScores, groupRankings, upcomingMatches, recentResults, predictedCount, totalMatches]
      properties:
        totalPoints:
          type: integer
        predictionsCount:
          type: integer
        correctWinners:
          type: integer
        exactScores:
          type: integer
        predictedCount:
          type: integer
        totalMatches:
          type: integer
        groupRankings:
          type: array
          items:
            $ref: "#/components/schemas/GroupRankSummary"
        upcomingMatches:
          type: array
          items:
            $ref: "#/components/schemas/MatchWithPrediction"
        recentResults:
          type: array
          items:
            $ref: "#/components/schemas/MatchWithPrediction"

    GroupRankSummary:
      type: object
      required: [groupId, groupName, rank, totalPoints, memberCount]
      properties:
        groupId:
          type: integer
        groupName:
          type: string
        rank:
          type: integer
        totalPoints:
          type: integer
        memberCount:
          type: integer
