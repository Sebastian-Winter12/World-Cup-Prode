name: Sincronizar Partidos

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  update-matches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar pnpm y dependencias
        shell: bash
        # Esto ignora cualquier configuración de pnpm previa y crea el entorno desde cero
        run: |
          npm install -g pnpm@9
          pnpm config set auto-install-peers true
          pnpm install --force
          pnpm run build

      - name: Ejecutar script de actualización
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: pnpm --filter @workspace/scripts run update-matches