name: Sincronizar Partidos

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  update-matches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar dependencias
        shell: bash
        # Eliminamos el archivo de configuración temporalmente antes de instalar
        run: |
          if [ -f .npmrc ]; then mv .npmrc .npmrc.bak; fi
          pnpm install --force --no-frozen-lockfile
          if [ -f .npmrc.bak ]; then mv .npmrc.bak .npmrc; fi

      - name: Ejecutar script de actualización
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: pnpm --filter @workspace/scripts run update-matches