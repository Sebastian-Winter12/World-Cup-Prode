name: Sincronizar Partidos

on:
  schedule:
    # Se ejecuta cada 10 minutos. (Puedes cambiarlo a '*/5 * * * *' para 5 min)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Esto te permite ejecutarlo a mano con un botón desde GitHub

jobs:
  update-matches:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Instalar dependencias
        run: pnpm install

      - name: Construir proyecto (opcional pero recomendado)
        run: pnpm run build

      - name: Ejecutar script de actualización
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: pnpm --filter @workspace/scripts run update-matches