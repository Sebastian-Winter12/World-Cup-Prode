name: Sincronizar Partidos

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  update-matches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Limpiar y preparar entorno
        shell: bash
        run: |
          # Borramos cualquier configuración residual de pnpm
          rm -rf .npmrc || true
          # Instalamos la versión específica de pnpm que usas localmente
          npm install -g pnpm@11.4.0
          # Configuramos pnpm para que ignore el lockfile permanentemente en esta sesión
          pnpm config set frozen-lockfile false
          # Instalamos dependencias forzando la regeneración del lockfile
          pnpm install --force --no-frozen-lockfile

      - name: Ejecutar script de actualización
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: pnpm --filter @workspace/scripts run update-matches